<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes MJPRU | The Ultimate Study Hub</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: Arial; }
    </style>
</head>

<body class="bg-gray-100">

<header class="bg-blue-600 text-white text-center py-10">
    <h1 class="text-3xl font-bold">📚 Notes MJPRU</h1>
    <p>Score Better with Premium Notes</p>
</header>

<section class="p-6">
    <h2 class="text-xl font-bold mb-4 text-center">📘 Available Notes</h2>

    <div class="grid md:grid-cols-3 gap-6">

        <div class="bg-white p-5 rounded-xl shadow">
            <h3 class="font-bold">Thermodynamics-I</h3>
            <p class="text-gray-500">Handwritten Notes</p>
            <p class="text-blue-600 font-bold">₹99</p>
            <button onclick="openPayment('Thermodynamics-I','₹99')" class="bg-green-500 text-white px-4 py-2 rounded mt-3 w-full">
                Buy Now
            </button>
        </div>

        <div class="bg-white p-5 rounded-xl shadow">
            <h3 class="font-bold">DBMS Notes</h3>
            <p class="text-gray-500">Topper Notes</p>
            <p class="text-blue-600 font-bold">₹79</p>
            <button onclick="openPayment('DBMS Notes','₹79')" class="bg-green-500 text-white px-4 py-2 rounded mt-3 w-full">
                Buy Now
            </button>
        </div>

    </div>
</section>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl text-center w-80">
        <h3 class="text-xl font-bold mb-2">Secure Payment</h3>
        <p id="noteName" class="text-gray-500 mb-2"></p>
        <p id="notePrice" class="font-bold mb-4"></p>

        <button onclick="confirmOrder()" class="bg-blue-600 text-white px-4 py-2 rounded w-full mb-3">
            Pay Now
        </button>

        <button onclick="closeModal()" class="text-gray-500 text-sm">
            Cancel
        </button>
    </div>
</div>

<footer class="text-center py-5 text-gray-500">
    © 2026 Notes MJPRU
</footer>

<script>

function openPayment(name, price){
    document.getElementById("noteName").innerText = name;
    document.getElementById("notePrice").innerText = price;
    document.getElementById("paymentModal").classList.remove("hidden");
}

function closeModal(){
    document.getElementById("paymentModal").classList.add("hidden");
}

function confirmOrder(){
    window.location.href="https://razorpay.me/@rohit285";
}

</script>

</body>
</html>
